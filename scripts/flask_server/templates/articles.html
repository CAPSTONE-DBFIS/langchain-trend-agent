<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기사 목록</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        img {
            max-width: 100px;
            height: auto;
        }
        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>기사 목록</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리</th>
                <th>언론사</th>
                <th>제목</th>
                <th>날짜</th>
                <th>댓글 수</th>
                <th>이미지</th>
                <th>링크</th>
                <th>요약</th>
            </tr>
        </thead>
        <tbody>
            {% for article in articles %}
            <tr>
                <td>{{ article[0] }}</td>
                <td>{{ article[1] }}</td>
                <td>{{ article[2] }}</td>
                <td>{{ article[3] }}</td>
                <td>{{ article[4] }}</td>
                <td>{{ article[5] }}</td>
                <td>
                    {% if article[6] %}
                        <a href="{{ article[6] }}" target="_blank">사진 보기</a>
                    {% else %}
                        없음
                    {% endif %}
                </td>
                <td><a href="{{ article[7] }}" target="_blank">기사 보기</a></td>
                <td>{{ article[8] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
