# 크롤링 대상 URL 및 관련 설정
crawling:
  base_url: "https://example.com"
  search_page: "/search"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
  request_timeout: 10   # 요청 대기 시간 (초)
  max_retries: 3        # 최대 재시도 횟수

# 크롤링 데이터 저장 경로 설정
storage:
  raw_data_path: "data/raw/"
  processed_data_path: "data/processed/"
  output_path: "data/output/"

#크롤링 주기
schedule:
  enabled: true
  cron: "0 9 * * MON"  # 매주 월요일 오전 9시에 실행
  interval_minutes: 60 # 60분 간격으로 반복 실행

#데이터 전처리 및 필터링 설정
data_processing:
  preprocessing:
    remove_empty: true        # 빈 값 필드 제거
    convert_case: "lower"     # 텍스트 필드 소문자로 변환 ("upper", "lower", "none")
    replace_null: "N/A"       # null 값을 "N/A"로 대체
  filtering:
    include_keywords:         # 특정 키워드가 포함된 데이터만 필터링
      - "temp"
      - "temp"
    exclude_keywords:         # 특정 키워드가 포함된 데이터는 제외
      - "temp"

#알림. 사용할지는 미정
alerts:
  enabled: true
  type: "email"  # 알림 유형 ("email", "slack", "sms")
  email:
    smtp_server: "smtp.example.com"
    port: 587
    sender_email: "your_email@example.com"
    receiver_email: "alert_receiver@example.com"
    subject: "Crawling Error Alert"
    username: "your_username"
    password: "your_password"
  slack:
    webhook_url: "https://hooks.slack.com/services/your/webhook/url"
  sms:
    provider: "twilio"
    account_sid: "your_account_sid"
    auth_token: "your_auth_token"
    from_number: "+123456789"
    to_number: "+987654321"

# API 키 및 인증 정보
api:
  service_a:
    api_key: "Undetermined"
  service_b:
    client_id: "Undetermined"
    client_secret: "Undetermined"